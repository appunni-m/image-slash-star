name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format, lint, and parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features
      - run: cargo test --all-features --test coverage_matrix_tests
      - name: Check minimal and per-format builds
        shell: bash
        run: |
          cargo check --no-default-features
          for feature in jpeg png gif bmp tiff webp ico avif; do
            cargo check --no-default-features --features "$feature"
          done
          cargo check --all-features --target wasm32-unknown-unknown
      - run: cargo package --allow-dirty

  supply-chain:
    name: Dependencies and licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --all-features --test coverage_matrix_tests --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: error
