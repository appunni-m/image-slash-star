name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Format, lint, and parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install AVIF build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes meson nasm ninja-build pkg-config
      - name: Cache pinned AVIF stack
        id: avif-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/avif-oracle
          key: avif-1.4.1-dav1d-1.5.3-aom-3.13.2-libyuv-sharpyuv-linux-x64-v1
      - name: Build pinned AVIF stack
        if: steps.avif-cache.outputs.cache-hit != 'true'
        run: scripts/build_avif_stack.sh "$RUNNER_TEMP/avif-oracle" "$RUNNER_TEMP/avif-build"
      - name: Select pinned AVIF stack
        run: |
          echo "PILLOW_RS_AVIF_LIB_DIR=$RUNNER_TEMP/avif-oracle/lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$RUNNER_TEMP/avif-oracle/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --all-features
      - run: cargo test --all-features --test coverage_matrix_tests
      - name: Check minimal and per-format builds
        shell: bash
        run: |
          cargo check --no-default-features
          for feature in jpeg png gif bmp tiff webp ico avif; do
            cargo check --no-default-features --features "$feature"
          done
          cargo check --all-features --target wasm32-unknown-unknown
      - run: cargo package --allow-dirty

  supply-chain:
    name: Dependencies and licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install AVIF build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes meson nasm ninja-build pkg-config
      - name: Restore pinned AVIF stack
        id: avif-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/avif-oracle
          key: avif-1.4.1-dav1d-1.5.3-aom-3.13.2-libyuv-sharpyuv-linux-x64-v1
      - name: Build pinned AVIF stack
        if: steps.avif-cache.outputs.cache-hit != 'true'
        run: scripts/build_avif_stack.sh "$RUNNER_TEMP/avif-oracle" "$RUNNER_TEMP/avif-build"
      - name: Select pinned AVIF stack
        run: |
          echo "PILLOW_RS_AVIF_LIB_DIR=$RUNNER_TEMP/avif-oracle/lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$RUNNER_TEMP/avif-oracle/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - run: cargo +nightly llvm-cov --all-features --branch --test coverage_matrix_tests --lcov --output-path lcov.info
      - uses: actions/upload-artifact@v7
        with:
          name: lcov
          path: lcov.info
          if-no-files-found: error
