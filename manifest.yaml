  ico:
    name: ICO
    extensions:
    - .ico
    magic:
    - 0
    - 0
    - 1
    - 0
    decoder: own (BMP/PNG wrapper)
    encoder: own
    status: in-progress
    encode_source:
      format: ico
      asset: 16x16.ico
    planned_gap_defaults:
      decode: Rust ICO decoding does not yet match Pillow for this declared input mode.
      encode: Rust ICO encoding does not yet match Pillow for this declared save operation.
    edge_cases:
    - id: single_icon
      description: Single icon entry
      test_assets:
      - single.ico
    - id: multi_res
      description: Multiple resolution entries
      test_assets:
      - multi.ico
    - id: png_entry
      description: ICO with embedded PNG data
      test_assets:
      - png_entry.ico
    - id: bmp_entry
      description: ICO with embedded BMP data (classic)
      test_assets:
      - bmp_entry.ico
    - id: bmp_depths
      description: Pillow BMP-in-ICO entries at indexed and true-color depths
      test_assets:
      - bmp_1bit.ico
      - bmp_4bit.ico
      - bmp_8bit.ico
      - bmp_32bit.ico
    - id: bmp_mask_transparency
      description: 24-bit BMP entry transparency supplied by the ICO AND mask
      test_assets:
      - bmp_24bit_transparent.ico
    - id: bmp_odd_width
      description: Packed one-bit BMP entry with a partial final source byte
      test_assets:
      - bmp_1bit_odd.ico
    - id: cursor
      description: CUR container with hotspot coordinates
      test_assets:
      - cursor.cur
      - cursor_default_palette.cur
      - cursor_24bit.cur
    - id: size_16x16
      description: 16x16 icon (most common)
      test_assets:
      - 16x16.ico
    - id: size_256x256
      description: 256x256 icon (modern)
      test_assets:
      - 256x256.ico
    - id: error_malformed
      description: Malformed ICO headers, directories, and entry payloads
      test_assets:
      - empty.ico
      - invalid_reserved.ico
      - invalid_type.ico
      - zero_entries.ico
      - truncated_directory.ico
      - zero_entry.ico
      - truncated_entry.ico
      - short_dib.ico
      - zero_width.ico
      - unsupported_bpp.ico
      - cursor_short_header.cur
      expect_error: true
    encode_edge_cases:
    - id: enc_16x16
      description: 16x16 icon
      params: {'sizes': [[16, 16]]}
      source_asset: 16x16.ico
    - id: enc_32x32
      description: 32x32 icon
      params: {'sizes': [[32, 32]]}
      source_asset: 256x256.ico
    - id: enc_48x48
      description: 48x48 icon
      params: {'sizes': [[48, 48]]}
      source_asset: 256x256.ico
    - id: enc_256x256
      description: 256x256 icon
      params: {'sizes': [[256, 256]]}
      source_asset: 256x256.ico
    - id: enc_multi_2
      description: Two-resolution icon
      params: {'sizes': [[16, 16], [32, 32]]}
      source_asset: 256x256.ico
    - id: enc_multi_4
      description: Four-resolution icon
      params: {'sizes': [[16, 16], [32, 32], [48, 48], [256, 256]]}
      source_asset: 256x256.ico
    - id: enc_bmp_entry
      description: 
      params: {'entry_type': 'bmp'}
    - id: enc_png_entry
      description: 
      params: {'entry_type': 'png'}
    - id: enc_24bit
      description: 
      source_format: bmp
      source_asset: 24bit.bmp
      params: {'bit_depth': 24}
    - id: enc_32bit
      description: 
      source_format: png
      source_asset: rgba.png
      params: {'bit_depth': 32}
    - id: enc_no_hotspot
      description: 
      params: {'hotspot': False}
    - id: enc_hotspot
      description: Pillow accepts but ignores the ICO hotspot option
      params: {'hotspot': [8, 8]}
    - id: enc_oversized_source
      description: Pillow downsamples sources larger than the 256px ICO ceiling
      source_format: png
      source_asset: large.png
    - id: enc_gray_resize
      description: Grayscale Lanczos resize before PNG-backed ICO encoding
      source_format: png
      source_asset: gray.png
      params: {'sizes': [[16, 16]]}
    - id: enc_rgba_resize
      description: Alpha-aware Lanczos resize before PNG-backed ICO encoding
      source_format: png
      source_asset: alpha_partial.png
      params: {'sizes': [[16, 16]]}
    - id: enc_integer_scale_resize
      description: Lanczos resize whose sample center has an exact sinc value
      source_asset: 48x48.ico
      params: {'sizes': [[16, 16]]}
    - id: enc_bmp_rgba
      description: 32-bit BGRA BMP-backed ICO entry
      source_format: png
      source_asset: rgba.png
      params: {'entry_type': 'bmp'}
    - id: enc_bmp_256
      description: BMP-backed ICO directory sentinel dimensions at 256px
      source_asset: 256x256.ico
      params: {'entry_type': 'bmp', 'sizes': [[256, 256]]}
    - id: enc_error_cmyk_resize
      description: Pillow cannot resize CMYK into its PNG-backed ICO path
      source_format: tiff
      source_asset: cmyk.tiff
      params: {'sizes': [[16, 16]]}
      expect_error: true
    - id: enc_error_cmyk_png
      description: Pillow cannot write an unscaled CMYK PNG-backed ICO entry
      source_format: tiff
      source_asset: cmyk.tiff
      params: {'sizes': [[128, 128]]}
      expect_error: true
    - id: enc_error_cmyk_bmp
      description: Pillow cannot write CMYK as a BMP-backed ICO entry
      source_format: tiff
      source_asset: cmyk.tiff
      params: {'entry_type': 'bmp', 'sizes': [[128, 128]]}
      expect_error: true
    - id: enc_malformed_sizes_ignored
      description: Pillow ignores an incomplete size tuple after valid entries
      params: {'sizes': [[16, 16], [32]]}

    - id: enc_multi
      description: Multi-resolution
      source_asset: 256x256.ico
      params:
        sizes:
        - [16, 16]
        - [32, 32]
