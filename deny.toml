[advisories]
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
highlight = "all"
skip = []
deny = []

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "IJG",
    "MIT-CMU",
    "Unicode-3.0",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
